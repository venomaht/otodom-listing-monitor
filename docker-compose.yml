services:
  ui:
    build: .
    container_name: otodom_ui
    depends_on:
      - db
    env_file:
      - .env.example
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    command: streamlit run app/ui.py --server.address=0.0.0.0 --server.port=8501

  worker:
    build: .
    container_name: otodom_worker
    depends_on:
      - db
    env_file:
      - .env.example
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
    command: python -m app.main

  db:
    image: postgres:16
    container_name: otodom_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: otodom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: